name: Develop GitHub Issue (Cloud-LLM Coding Agent)

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Target repository, as owner/name (must be one you have write access to)"
        required: true
        type: string
      issue_number:
        description: "Issue number in the target repository to resolve. The issue (and every comment used as input) must be authored by the account owning DEV_AGENT_PAT — anything else is refused."
        required: true
        type: string
      draft_pr:
        description: "Open the pull request as a draft"
        required: false
        type: boolean
        default: true
      max_iterations:
        description: "Max agent tool-call rounds before giving up"
        required: false
        type: string
        default: "40"

jobs:
  develop:
    runs-on: ubuntu-latest
    # No local model to download and no local inference, so this should
    # finish in minutes to tens of minutes for most issues, not hours — the
    # generous ceiling just guards against a runaway conversation.
    timeout-minutes: 120
    steps:
      - name: Checkout agent scripts
        uses: actions/checkout@v4

      # Reads scripts/agent/test_runner.py's REPO_OVERRIDES directly (pure
      # stdlib, no pip install needed yet) so the PHP version/extensions a
      # target repo needs live in exactly one place, not duplicated here.
      # Without this, composer install runs against whatever PHP happens to
      # be ubuntu-latest's current default, which drifts over time and can
      # silently stop matching a repo's committed composer.lock.
      - name: Determine required PHP version
        id: php_setup
        run: |
          python3 - <<'PYEOF' >> "$GITHUB_OUTPUT"
          import sys
          sys.path.insert(0, "scripts")
          from agent.test_runner import REPO_OVERRIDES
          override = REPO_OVERRIDES.get("${{ inputs.repo }}", {})
          print(f"version={override.get('php_version', '')}")
          print(f"extensions={override.get('php_extensions', '')}")
          PYEOF

      - name: Set up PHP
        if: steps.php_setup.outputs.version != ''
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ steps.php_setup.outputs.version }}
          extensions: ${{ steps.php_setup.outputs.extensions }}
          tools: composer

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run coding agent (cloud LLM, tools executed locally)
        env:
          TARGET_REPO: ${{ inputs.repo }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          DRAFT_PR: ${{ inputs.draft_pr }}
          MAX_ITERATIONS: ${{ inputs.max_iterations }}
          AGENT_TIME_BUDGET_SECONDS: "6000"
          GH_TOKEN: ${{ secrets.DEV_AGENT_PAT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/develop_issue.py
